<!DOCTYPE html>
<html>
<head>
    <title>View Products</title>
</head>
<body>

<h1>All Products</h1>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Product Name</th>
        <th>Price</th>
        <th>Description</th>
        <th>Action</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product[0] }}</td>
        <td>{{ product[2] }}</td>
        <td>{{ product[3] }}</td>
        <td>{{ product[4] }}</td>

        <td>
            <a href="/delete-product/{{ product[0] }}">
                Delete
            </a>
        </td>
    </tr>
    {% endfor %}

</table>

<br>

<a href="/vendor-dashboard">Back to Dashboard</a>

</body>
</html>
